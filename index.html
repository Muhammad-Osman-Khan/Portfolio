function useInView(threshold=0.15){
  const ref = useRef(null);
  const [inView,setInView] = useState(false);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{ if(e.isIntersecting) setInView(true); },{threshold});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[threshold]);
  return [ref,inView];
}

function useTypewriter(words,speed=80,pause=2200){
  const [text,setText] = useState('');
  const [idx,setIdx] = useState(0);
  const [del,setDel] = useState(false);
  useEffect(()=>{
    const word = words[idx%words.length];
    const timeout = setTimeout(()=>{
      if(!del){
        if(text.length < word.length){ setText(word.slice(0,text.length+1)); }
        else { setTimeout(()=>setDel(true),pause); }
      } else {
        if(text.length>0){ setText(text.slice(0,-1)); }
        else { setDel(false); setIdx(i=>i+1); }
      }
    }, del ? speed/2 : speed);
    return ()=>clearTimeout(timeout);
  },[text,del,idx,words,speed,pause]);
  return text;
}

            </p>
            <div style={{display:'flex',flexDirection:'column',gap:16}}>

                {icon:'📧',label:'Email',val:'usmankhan19067@gmail.com',href:'mailto:usmankhan19067@gmail.com'},
                {icon:'📍',label:'Location',val:'Karachi, Pakistan',href:null},

                  onFocus={e=>{e.target.style.border='1px solid rgba(0,212,255,0.4)'}}

/* ─── LOADING SCREEN ─── */
function Loader({done}){
  return (
    <div style={{
      position:'fixed',inset:0,zIndex:9999,background:'var(--bg)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      transition:'opacity 0.5s ease, transform 0.5s ease',
      opacity: done ? 0 : 1,
      transform: done ? 'scale(1.05)' : 'none',
      pointerEvents: done ? 'none' : 'auto',
    }}>
      <div style={{fontFamily:'var(--font-display)',fontSize:48,fontWeight:800,color:'transparent',background:'linear-gradient(90deg,var(--cyan),var(--purple))',WebkitBackgroundClip:'text',backgroundClip:'text',animation:'glow-pulse 1.5s ease infinite',marginBottom:24}}>
        UK
      </div>
      <div style={{width:200,height:2,background:'rgba(255,255,255,0.06)',borderRadius:999,overflow:'hidden'}}>
        <div style={{height:'100%',background:'linear-gradient(90deg,var(--cyan),var(--purple))',borderRadius:999,width:done?'100%':'60%',transition:'width 0.5s ease'}}/>
      </div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text3)',marginTop:16,letterSpacing:2}}>LOADING PORTFOLIO...</div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [loaded,setLoaded] = useState(false);
  const [active,setActive] = useState('hero');
  useEffect(()=>{
    const t = setTimeout(()=>setLoaded(true),1400);
    return ()=>clearTimeout(t);
  },[]);
  useEffect(()=>{
    const h = ()=>{
      const secs = ['hero','about','skills','projects','achievements','education','contact'];
      for(const id of [...secs].reverse()){
        const el = document.getElementById(id);
        if(el && window.scrollY >= el.offsetTop - 200){ setActive(id); break; }
      }
    };
    window.addEventListener('scroll',h);
    return ()=>window.removeEventListener('scroll',h);
  },[]);
  return (
    <>
      <Loader done={loaded}/>
      <GridBg/>
      <Navbar active={active}/>
      <main>
        <Hero/>
        <About/>
        <Skills/>
        <Projects/>
        <Achievements/>
        <Leadership/>
        <Education/>
        <Contact/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
